<svg xmlns="http://www.w3.org/2000/svg">
  <!-- 各服务商的简化品牌标识(用品牌色,示意性图形,非官方 logo 的精确复制)。
       通过 QuotaScreen 的 providerLogoId(provider_id) 映射;未命中的走 logo-generic。 -->

  <!-- OpenAI(codex):六重旋转对称的花结,取其标志性花形 -->
  <symbol id="logo-openai" viewBox="0 0 24 24">
    <g fill="#0f9d76">
      <ellipse cx="12" cy="6.4" rx="2.05" ry="4.4"/>
      <ellipse cx="12" cy="6.4" rx="2.05" ry="4.4" transform="rotate(60 12 12)"/>
      <ellipse cx="12" cy="6.4" rx="2.05" ry="4.4" transform="rotate(120 12 12)"/>
      <ellipse cx="12" cy="6.4" rx="2.05" ry="4.4" transform="rotate(180 12 12)"/>
      <ellipse cx="12" cy="6.4" rx="2.05" ry="4.4" transform="rotate(240 12 12)"/>
      <ellipse cx="12" cy="6.4" rx="2.05" ry="4.4" transform="rotate(300 12 12)"/>
      <circle cx="12" cy="12" r="2.1" fill="#fff"/>
    </g>
  </symbol>

  <!-- Claude(claude):Anthropic 的放射星芒 -->
  <symbol id="logo-claude" viewBox="0 0 24 24">
    <g fill="#d97757">
      <path d="M12 2c.5 3.1.9 5 1.2 5.7.3-.6 1.3-2.3 3-5.1-.9 3-1.4 4.9-1.5 5.6.6-.4 2.3-1.5 5-3.3-2.2 2.3-3.6 3.7-4.1 4.2.7 0 2.7-.1 6-.4-3.1.9-5 1.4-5.7 1.5.6.3 2.4 1.2 5.4 2.6-3.1-.7-5-1.1-5.7-1.2.4.6 1.5 2.2 3.4 4.9-2.4-2.1-3.8-3.4-4.3-3.9 0 .7.1 2.7.4 6-.9-3.1-1.4-5-1.5-5.7-.3.6-1.2 2.4-2.6 5.4.7-3.1 1.1-5 1.2-5.7-.6.4-2.2 1.5-4.9 3.4C6 16.9 7.3 15.5 7.8 15c-.7 0-2.7.1-6 .4 3.1-.9 5-1.4 5.7-1.5-.6-.3-2.4-1.2-5.4-2.6 3.1.7 5 1.1 5.7 1.2-.4-.6-1.5-2.3-3.3-5 2.3 2.2 3.7 3.6 4.2 4.1 0-.7-.1-2.8-.4-6.1.9 3.1 1.4 5 1.5 5.7.3-.6 1.2-2.4 2.5-5.3z"/>
    </g>
  </symbol>

  <!-- GitHub Copilot(copilot):Copilot 圆脸护目镜机器人 -->
  <symbol id="logo-copilot" viewBox="0 0 24 24">
    <g fill="#1f2328">
      <path d="M12 4.5c-3.3 0-4.4 1.6-4.8 2.9C5.6 7.7 4 9 4 12.4v2.3c0 3 3.6 4.8 8 4.8s8-1.8 8-4.8v-2.3c0-3.4-1.6-4.7-3.2-5-.4-1.3-1.5-2.9-4.8-2.9zm0 2c1.9 0 2.5.7 2.8 1.7H9.2c.3-1 .9-1.7 2.8-1.7z"/>
      <ellipse cx="9" cy="13.4" rx="1.5" ry="2" fill="#fff"/>
      <ellipse cx="15" cy="13.4" rx="1.5" ry="2" fill="#fff"/>
    </g>
  </symbol>

  <!-- Antigravity(antigravity):Google Gemini 的四角星 sparkle -->
  <symbol id="logo-gemini" viewBox="0 0 24 24">
    <path fill="#4285f4" d="M12 2c.4 5.2 4.4 9.2 9.6 9.6v.8C16.4 12.8 12.4 16.8 12 22c-.4-5.2-4.4-9.2-9.6-9.6v-.8C7.6 11.2 11.6 7.2 12 2z"/>
  </symbol>

  <!-- DeepSeek(deepseek):鲸鱼侧影 -->
  <symbol id="logo-deepseek" viewBox="0 0 24 24">
    <g fill="#4d6bfe">
      <path d="M3 10.5c2.5-.5 4.4.3 5.7 1.4 1.4-2.4 3.8-4 6.6-4.4-.6.9-.9 1.8-1 2.7 2-.4 3.8.1 5.4 1.3-1 .1-1.8.4-2.5.9 1 .8 1.6 1.8 1.8 3.1-1.3-1.1-2.7-1.5-4.2-1.4-1.9.2-3.6 1.3-4.8 2.9-.3-1-.9-1.8-1.6-2.4-1.4 1-3 1.4-4.9 1.2 1-.5 1.7-1.2 2.1-2-1.4-.9-2.5-2.1-3.1-3.6z"/>
      <circle cx="15.4" cy="10.6" r="0.8" fill="#fff"/>
    </g>
  </symbol>

  <!-- Kiro(kiro):AWS Kiro,幽灵/圆顶方 -->
  <symbol id="logo-kiro" viewBox="0 0 24 24">
    <g fill="#7c5cff">
      <path d="M5 12a7 7 0 0 1 14 0v6.5c0 .6-.7.9-1.1.4l-1.3-1.3-1.4 1.4a.6.6 0 0 1-.9 0L12 17.6l-1.3 1.4a.6.6 0 0 1-.9 0l-1.4-1.4-1.3 1.3c-.4.5-1.1.2-1.1-.4z"/>
      <circle cx="9.5" cy="11.5" r="1.3" fill="#fff"/>
      <circle cx="14.5" cy="11.5" r="1.3" fill="#fff"/>
    </g>
  </symbol>

  <!-- GLM(glm):智谱,蓝紫方块 + Z -->
  <symbol id="logo-glm" viewBox="0 0 24 24">
    <rect x="3.5" y="3.5" width="17" height="17" rx="5" fill="#3859ff"/>
    <path d="M8 8.5h8l-8 7h8" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Trae(trae):字节 Trae,渐变方 + T -->
  <symbol id="logo-trae" viewBox="0 0 24 24">
    <rect x="3.5" y="3.5" width="17" height="17" rx="5" fill="#ee2b8b"/>
    <path d="M7.5 8.5h9M12 8.5v7" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
  </symbol>

  <!-- OpenRouter(openrouter):环形路由 -->
  <symbol id="logo-openrouter" viewBox="0 0 24 24">
    <g fill="none" stroke="#6a7280" stroke-width="2">
      <circle cx="12" cy="12" r="7.5"/>
      <path d="M12 4.5v3M12 16.5v3M4.5 12h3M16.5 12h3" stroke-linecap="round"/>
    </g>
    <circle cx="12" cy="12" r="2.4" fill="#6a7280"/>
  </symbol>

  <!-- Cursor(cursor):立方/光标 -->
  <symbol id="logo-cursor" viewBox="0 0 24 24">
    <g fill="#111827">
      <path d="M12 3 20 7.5v9L12 21 4 16.5v-9L12 3z" opacity="0.15"/>
      <path d="M12 3 20 7.5 12 12 4 7.5 12 3zM4 7.5 12 12v9L4 16.5v-9zM20 7.5 12 12v9l8-4.5v-9z" opacity="0.85"/>
    </g>
  </symbol>

  <!-- 兜底:通用层叠(自定义接口 / 内部网关 / 未识别) -->
  <symbol id="logo-generic" viewBox="0 0 24 24">
    <path d="m12 4 8 4-8 4-8-4 8-4Zm-6 8 6 3 6-3M6 16l6 3 6-3" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>
