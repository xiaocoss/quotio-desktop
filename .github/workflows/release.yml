name: Release

# 推送 v* 标签时，在 Windows / macOS / Linux 三端各自构建并把安装包传到对应 Release。
# 用法：npm run version:set -- minor  →  git commit  →  git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 也允许在 Actions 页手动触发（调试用）

permissions:
  contents: write # tauri-action 需要写权限来创建 Release / 上传附件

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # 通用包，同时覆盖 Apple Silicon + Intel
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm install

      # 把 CLIProxyAPI 核心预先打进安装包，装完即用、首次运行不再下载。
      # 内置二进制名是 cli-proxy-api[.exe]，app 期望 CLIProxyAPI[.exe]，解压后改名。
      - name: Stage CLIProxyAPI core — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "7.2.20"
          $url = "https://github.com/router-for-me/CLIProxyAPI/releases/download/v$ver/CLIProxyAPI_${ver}_windows_amd64.zip"
          $dest = "resources/proxy/windows"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $env:RUNNER_TEMP "cpa.zip"
          $ext = Join-Path $env:RUNNER_TEMP "cpa"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $ext -Force
          $bin = Get-ChildItem -Path $ext -Recurse -Filter "cli-proxy-api*.exe" | Select-Object -First 1
          if (-not $bin) { throw "cli-proxy-api.exe not found in CLIProxyAPI archive" }
          Copy-Item $bin.FullName (Join-Path $dest "CLIProxyAPI.exe") -Force
          Write-Host ("Staged " + $dest + "/CLIProxyAPI.exe")

      - name: Stage CLIProxyAPI core — macOS/Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ver=7.2.20
          if [ "$RUNNER_OS" = "macOS" ]; then
            asset="CLIProxyAPI_${ver}_darwin_aarch64.tar.gz"; dir="darwin"
          else
            asset="CLIProxyAPI_${ver}_linux_amd64.tar.gz"; dir="linux"
          fi
          url="https://github.com/router-for-me/CLIProxyAPI/releases/download/v${ver}/${asset}"
          dest="resources/proxy/${dir}"
          mkdir -p "$dest"
          tmp="$(mktemp -d)"
          curl -fsSL --retry 3 "$url" -o "$tmp/cpa.tgz"
          tar -xzf "$tmp/cpa.tgz" -C "$tmp"
          bin="$(find "$tmp" -type f -name 'cli-proxy-api*' | head -1)"
          if [ -z "$bin" ]; then echo "cli-proxy-api not found in archive"; ls -R "$tmp"; exit 1; fi
          cp "$bin" "$dest/CLIProxyAPI"
          chmod +x "$dest/CLIProxyAPI"
          echo "Staged $dest/CLIProxyAPI"

      - name: Build and publish to Release
        uses: tauri-apps/tauri-action@v0
        env:
          # 用 PAT(RELEASE_TOKEN)发 Release —— 内置 GITHUB_TOKEN 即使有 contents:write
          # 也会在 create-release 时报 "Resource not accessible by integration"(GitHub
          # 侧的 integration 限制)。PAT 以用户身份跑,绕过该限制。没配 PAT 时回退到
          # GITHUB_TOKEN(可能仍失败)。
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # 自动更新签名密钥(在仓库 Settings → Secrets and variables → Actions 配置)。
          # 缺失时不会生成 latest.json / .sig,自动更新不可用,但安装包照常构建。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 内置 OAuth 凭据(Google 公开安装版凭据),构建期由 option_env! 注入到
          # native_oauth.rs(gemini-cli)/ quota.rs(Antigravity)。在仓库
          # Settings → Secrets and variables → Actions 配置;缺失则对应登录/额度功能
          # 在发布版里不可用(优雅降级),其余功能照常。
          QUOTIO_GEMINI_CLIENT_ID: ${{ secrets.QUOTIO_GEMINI_CLIENT_ID }}
          QUOTIO_GEMINI_CLIENT_SECRET: ${{ secrets.QUOTIO_GEMINI_CLIENT_SECRET }}
          QUOTIO_ANTIGRAVITY_CLIENT_ID: ${{ secrets.QUOTIO_ANTIGRAVITY_CLIENT_ID }}
          QUOTIO_ANTIGRAVITY_CLIENT_SECRET: ${{ secrets.QUOTIO_ANTIGRAVITY_CLIENT_SECRET }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Quotio ${{ github.ref_name }}"
          releaseBody: |
            自动构建的 Windows / macOS / Linux 安装包见下方附件。

            - Windows：`.msi` 或 `-setup.exe`
            - macOS：`.dmg`（通用包，未签名；首次打开在「系统设置 → 隐私与安全性」点允许）
            - Linux：`.AppImage` / `.deb`

            > 代理二进制（CLIProxyAPI）不随包分发，应用首次运行会自动下载。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # 等三端构建完成后,把 latest.json 里的安装包直链改写为走 ghproxy 镜像,
  # 改善国内自动更新的下载速度。应用拉取清单的端点见
  # apps/desktop/src-tauri/tauri.conf.json 的 plugins.updater.endpoints。
  rewrite-manifest:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Rewrite latest.json download URLs through ghproxy
        env:
          # 同 build:用 PAT 改写/上传 latest.json,绕过内置 token 的 integration 限制。
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          # 镜像挂了随时换:在仓库 Settings → Variables 设 GHPROXY_PREFIX 覆盖(末尾带 /)。
          GHPROXY: ${{ vars.GHPROXY_PREFIX || 'https://ghfast.top/' }}
        run: |
          set -euo pipefail
          # latest.json 仅在配置了签名密钥时才会由 tauri-action 生成;没有就跳过,不让发版失败。
          if ! gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -p latest.json --clobber; then
            echo "本次 Release 无 latest.json(可能未配置签名密钥),跳过 ghproxy 改写。"
            exit 0
          fi
          jq --arg p "$GHPROXY" '
            .platforms |= with_entries(
              .value.url |= (if startswith($p) then . else $p + . end)
            )
          ' latest.json > latest.rewritten.json
          mv latest.rewritten.json latest.json
          gh release upload "$TAG" latest.json --repo "$GITHUB_REPOSITORY" --clobber
